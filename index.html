<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESPAWN — Breaking Game News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a;
    --card: #0e0e16;
    --border: #1a1a28;
    --accent: #e8ff47;
    --red: #ff3f5e;
    --teal: #4dffdb;
    --text: #eeeef5;
    --muted: #5a5a78;
    --dim: #2a2a3e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; height:52px;
    background:rgba(6,6,10,0.95); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .logo {
    font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:6px;
    color:var(--accent); text-shadow:0 0 40px rgba(232,255,71,0.25);
  }
  .hdr-right { display:flex; align-items:center; gap:14px; }
  .pip {
    width:6px; height:6px; border-radius:50%;
    background:var(--red); box-shadow:0 0 8px var(--red);
    animation:pip 1.4s ease-in-out infinite;
  }
  @keyframes pip { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }
  .rbtn {
    background:none; border:1px solid var(--border); color:var(--muted);
    font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:2px;
    padding:5px 12px; cursor:pointer; text-transform:uppercase; transition:all .15s;
  }
  .rbtn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .rbtn:disabled { opacity:0.3; cursor:not-allowed; }

  /* TICKER */
  .ticker { height:28px; background:var(--red); display:flex; align-items:center; overflow:hidden; }
  .tflag {
    background:#000; color:var(--red);
    font-family:'Bebas Neue',sans-serif; font-size:0.8rem; letter-spacing:3px;
    padding:0 14px; height:100%; display:flex; align-items:center; flex-shrink:0;
  }
  .tscroll { overflow:hidden; flex:1; }
  .tinner { display:flex; white-space:nowrap; animation:tick 80s linear infinite; }
  .tinner span {
    font-family:'Space Mono',monospace; font-size:0.62rem; font-weight:700;
    color:#000; padding:0 32px;
  }
  @keyframes tick { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* MAIN */
  main { max-width:1440px; margin:0 auto; padding:24px 28px 60px; }
  .sh { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .st { font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:4px; color:var(--muted); }
  .st em { color:var(--accent); font-style:normal; }
  .sc { font-family:'Space Mono',monospace; font-size:0.55rem; color:var(--dim); letter-spacing:2px; }

  /* GRID — auto rows so height is driven purely by content */
  .grid {
    display:grid;
    grid-template-columns:repeat(12,1fr);
    grid-auto-rows:auto;
    gap:1px;
    background:var(--border);
    border:1px solid var(--border);
  }

  /* CARDS */
  .card {
    background:var(--card); padding:18px 20px;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; justify-content:flex-start;
    text-decoration:none; color:inherit; transition:background .2s;
  }
  .card:hover { background:#121221; }
  .card:hover .arr { opacity:1; transform:translate(2px,-2px); }
  /* heat bar top edge */
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:var(--hc,transparent); opacity:var(--ho,0);
  }

  /* layout variants — no min-heights, size = content */
  .c-hero  { grid-column:span 7; }
  .c-tall  { grid-column:span 5; }
  .c-third { grid-column:span 4; }
  .c-wide  { grid-column:span 8; flex-direction:row; align-items:flex-start; gap:20px; }
  .c-wide .wb { flex:1; }
  .c-sm    { grid-column:span 4; }

  .arr {
    position:absolute; top:14px; right:14px;
    font-size:0.7rem; color:var(--accent); opacity:0; transition:opacity .2s,transform .2s;
  }
  .src {
    display:inline-flex; align-items:center; gap:5px;
    font-family:'Space Mono',monospace; font-size:0.56rem; letter-spacing:1.5px;
    text-transform:uppercase; margin-bottom:7px; color:var(--sc2,var(--muted));
  }
  .sdot { width:5px; height:5px; border-radius:50%; background:var(--sc2,var(--muted)); flex-shrink:0; }
  .htag {
    display:inline-block; background:var(--red); color:#fff;
    font-family:'Space Mono',monospace; font-size:0.46rem; letter-spacing:2px;
    padding:2px 7px; margin-bottom:7px; text-transform:uppercase; font-weight:700;
  }
  .ctitle {
    font-family:'Bebas Neue',sans-serif; letter-spacing:1px; line-height:1.1;
    color:var(--text); margin-bottom:8px;
  }
  .c-hero .ctitle  { font-size:clamp(1.7rem,2.6vw,2.8rem); }
  .c-tall .ctitle  { font-size:clamp(1.15rem,1.5vw,1.65rem); }
  .c-third .ctitle { font-size:clamp(1rem,1.35vw,1.45rem); }
  .c-wide .ctitle  { font-size:clamp(1rem,1.2vw,1.3rem); }
  .c-sm .ctitle    { font-size:clamp(0.95rem,1.1vw,1.25rem); }
  .cdesc {
    font-size:0.82rem; color:var(--muted); line-height:1.55; margin-bottom:10px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .c-hero .cdesc { -webkit-line-clamp:4; font-size:0.88rem; }
  .cmeta {
    display:flex; align-items:center; gap:7px;
    font-family:'Space Mono',monospace; font-size:0.53rem; color:var(--dim); letter-spacing:1px;
    margin-top:auto;
  }
  .cage { color:var(--muted); }
  .ms { color:var(--border); }

  /* new-article flash */
  @keyframes flashNew {
    0%   { background:#1a2a1a; }
    100% { background:var(--card); }
  }
  .card-new { animation: flashNew 1.2s ease forwards; }

  /* SKELETON */
  .sgrid { display:grid; grid-template-columns:repeat(12,1fr); gap:1px; background:var(--border); border:1px solid var(--border); }
  .sk { background:var(--card); position:relative; overflow:hidden; }
  .sk::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.025),transparent);
    animation:shim 1.6s ease-in-out infinite;
  }
  @keyframes shim { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  /* STATUS */
  .status {
    grid-column:span 12; background:var(--card); padding:50px 40px;
    text-align:center; font-family:'Space Mono',monospace;
  }
  .status h2 { font-size:0.72rem; letter-spacing:4px; color:var(--red); margin-bottom:10px; }
  .status p  { font-size:0.58rem; color:var(--muted); letter-spacing:1px; margin-bottom:20px; max-width:480px; margin-left:auto; margin-right:auto; }
  .status button {
    background:none; border:1px solid var(--red); color:var(--red);
    font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:2px;
    padding:9px 20px; cursor:pointer; text-transform:uppercase; transition:all .15s;
  }
  .status button:hover { background:var(--red); color:#000; }

  footer {
    border-top:1px solid var(--border); padding:14px 28px;
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Space Mono',monospace; font-size:0.53rem; color:var(--muted); letter-spacing:1.5px;
  }

  @media(max-width:900px){
    .c-hero{grid-column:span 12} .c-tall{grid-column:span 6}
    .c-third{grid-column:span 6} .c-wide{grid-column:span 12;flex-direction:column}
    .c-sm{grid-column:span 6}
  }
  @media(max-width:560px){
    main{padding:16px 12px 40px} header{padding:0 14px}
    .c-tall,.c-third,.c-sm{grid-column:span 12}
  }
</style>
</head>
<body>

<header>
  <div class="logo">DELTT's NEWS HUB</div>
  <div class="hdr-right">
    <div class="pip"></div>
    <button class="rbtn" id="btn" onclick="loadAll(true)">↻ REFRESH</button>
  </div>
</header>

<div class="ticker">
  <div class="tflag">LIVE</div>
  <div class="tscroll">
    <div class="tinner" id="ticker">
      <span>Fetching gaming headlines…</span><span>Fetching gaming headlines…</span>
    </div>
  </div>
</div>

<main>
  <div class="sh">
    <div class="st">BREAKING — <em id="dateStr"></em></div>
    <div class="sc" id="count"></div>
  </div>
  <div id="container"></div>
</main>

<footer>
  <span id="upd">—</span>
  <span>POLYGON · IGN · KOTAKU · EUROGAMER · NINTENDO · XBOX · PLAYSTATION · VGC · GAMESPOT</span>
</footer>

<script>
const PROXY  = url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
const PROXY2 = url => `https://corsproxy.io/?${encodeURIComponent(url)}`;

const SOURCES = [
  { name:'Polygon',     color:'#ff4500', feed:'https://www.polygon.com/rss/index.xml' },
  { name:'IGN',         color:'#e2002a', feed:'https://feeds.ign.com/ign/games-all' },
  { name:'Kotaku',      color:'#00c99a', feed:'https://kotaku.com/rss' },
  { name:'Eurogamer',   color:'#ff7c1f', feed:'https://www.eurogamer.net/feed' },
  { name:'GameSpot',    color:'#ffcc00', feed:'https://www.gamespot.com/feeds/mashup/' },
  { name:'VGC',         color:'#a78bfa', feed:'https://www.videogameschronicle.com/feed/' },
  { name:'Xbox',        color:'#52b043', feed:'https://news.xbox.com/en-us/feed/' },
  { name:'PlayStation', color:'#0070d1', feed:'https://blog.playstation.com/feed/' },
  { name:'Nintendo',    color:'#e4001d', feed:'https://www.nintendo.com/whatsnew/feed/news.xml' },
];

// URLs we have already rendered — used for diff
let knownUrls = new Set();
let isFirstLoad = true;

function ageMs(d) { try { return Date.now() - new Date(d).getTime(); } catch { return Infinity; } }

function fmtAge(ms) {
  const m = Math.floor(ms / 60000);
  if (m < 2)  return 'JUST NOW';
  if (m < 60) return m + 'M AGO';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'H AGO';
  return Math.floor(h / 24) + 'D AGO';
}

function cleanText(s) {
  if (!s) return '';
  return s.replace(/<!\[CDATA\[|\]\]>/g,'')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/\s+/g,' ').trim();
}

function parseXML(xmlStr) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlStr, 'text/xml');
    const items = Array.from(doc.querySelectorAll('item, entry'));
    return items.map(item => {
      const get = (...tags) => {
        for (const t of tags) {
          const el = item.querySelector(t);
          if (el) return el.textContent || el.getAttribute('href') || '';
        }
        return '';
      };
      const link = item.querySelector('link');
      const url = link ? (link.textContent.trim() || link.getAttribute('href') || '') : '';
      const pubDate = get('pubDate','published','updated','dc\\:date');
      return {
        title: cleanText(get('title')),
        desc:  cleanText(get('description','summary','content\\:encoded','content')).slice(0,300),
        url,
        date:  pubDate,
        age:   ageMs(pubDate),
      };
    }).filter(a => a.title && a.url);
  } catch(e) { return []; }
}

async function fetchFeed(src) {
  for (const proxyFn of [PROXY, PROXY2]) {
    try {
      const res = await fetch(proxyFn(src.feed), { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const text = await res.text();
      let xmlStr;
      try { const j = JSON.parse(text); xmlStr = j.contents || j.data || text; }
      catch { xmlStr = text; }
      if (!xmlStr || xmlStr.length < 100) continue;
      const items = parseXML(xmlStr);
      if (!items.length) continue;
      return items.map(a => ({ ...a, source: src.name, color: src.color }));
    } catch(e) { /* try next */ }
  }
  return [];
}

function heat(ms) {
  if (ms < 2*3600000)  return { c:'#ff3f5e', o:'1' };
  if (ms < 8*3600000)  return { c:'#e8ff47', o:'0.8' };
  if (ms < 24*3600000) return { c:'#4dffdb', o:'0.45' };
  return { c:'transparent', o:'0' };
}

function cardClass(i) {
  if (i === 0)            return 'c-hero';
  if (i === 1 || i === 2) return 'c-tall';
  if (i >= 3 && i <= 5)  return 'c-third';
  if (i % 3 === 0)        return 'c-wide';
  return 'c-sm';
}

function buildCard(a, i, isNew) {
  const h   = heat(a.age);
  const cls = cardClass(i);
  const isHot     = a.age < 3 * 3600000;
  const showDesc  = (cls==='c-hero'||cls==='c-tall'||cls==='c-wide') && a.desc;

  const card = document.createElement('a');
  card.href = a.url; card.target='_blank'; card.rel='noopener noreferrer';
  card.className = 'card ' + cls + (isNew ? ' card-new' : '');
  card.dataset.url = a.url;
  card.style.setProperty('--hc',  h.c);
  card.style.setProperty('--ho',  h.o);
  card.style.setProperty('--sc2', a.color);

  const body = `
    ${isHot ? '<div class="htag">BREAKING</div>' : ''}
    <div class="src"><div class="sdot"></div>${a.source}</div>
    <div class="ctitle">${a.title}</div>
    ${showDesc ? `<div class="cdesc">${a.desc}</div>` : ''}
    <div class="cmeta">
      <span class="cage">${fmtAge(a.age)}</span>
      ${a.date ? `<span class="ms">·</span><span>${new Date(a.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>` : ''}
    </div>`;

  card.innerHTML = `<div class="arr">↗</div>${cls==='c-wide' ? `<div class="wb">${body}</div>` : body}`;
  return card;
}

function skeleton() {
  document.getElementById('container').innerHTML = `
    <div class="sgrid">
      <div class="sk" style="grid-column:span 7;height:260px"></div>
      <div class="sk" style="grid-column:span 5;height:128px"></div>
      <div class="sk" style="grid-column:span 5;height:128px"></div>
      <div class="sk" style="grid-column:span 4;height:140px"></div>
      <div class="sk" style="grid-column:span 4;height:140px"></div>
      <div class="sk" style="grid-column:span 4;height:140px"></div>
    </div>`;
}

function updateTicker(articles) {
  const t = document.getElementById('ticker');
  const items = articles.slice(0,16).map(a=>`${a.source.toUpperCase()}: ${a.title}`);
  t.innerHTML = [...items,...items].map(s=>`<span>▶ ${s}</span>`).join('');
}

// ── SMART DIFF RENDER ──────────────────────────────────────────────────────
// First load: full animated render.
// Subsequent loads: only replace slots whose URL changed; flash new ones green.
function renderOrDiff(articles, forceFullRender) {
  const el = document.getElementById('container');

  if (!articles.length) {
    el.innerHTML = `<div class="sgrid"><div class="status">
      <h2>NO STORIES LOADED</h2>
      <p>Could not reach RSS feeds. The proxy services may be temporarily down. Check your network and retry.</p>
      <button onclick="loadAll(true)">↻ RETRY</button>
    </div></div>`;
    return;
  }

  // Full render (first load or manual refresh)
  if (forceFullRender || !el.querySelector('.grid')) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    articles.forEach((a, i) => {
      const card = buildCard(a, i, false);
      card.style.opacity = '0';
      card.style.transform = 'translateY(8px)';
      card.style.transition = `opacity .3s ease ${i*.04}s, transform .3s ease ${i*.04}s, background .2s`;
      grid.appendChild(card);
    });
    el.innerHTML = '';
    el.appendChild(grid);
    requestAnimationFrame(() => {
      grid.querySelectorAll('.card').forEach(c => { c.style.opacity='1'; c.style.transform='translateY(0)'; });
    });
    knownUrls = new Set(articles.map(a => a.url));
    return;
  }

  // Diff render — swap only changed slots
  const existingCards = Array.from(el.querySelectorAll('.card'));
  const newUrls = new Set(articles.map(a => a.url));
  let changed = 0;

  articles.forEach((a, i) => {
    if (knownUrls.has(a.url)) return; // already shown
    // Replace the card at this slot if it exists
    const oldCard = existingCards[i];
    const newCard = buildCard(a, i, true);
    newCard.style.transition = 'background .2s';
    if (oldCard) {
      oldCard.parentNode.replaceChild(newCard, oldCard);
    }
    changed++;
  });

  // If the whole list shifted (e.g. 5+ new stories), just do a full re-render
  if (changed >= 4) {
    renderOrDiff(articles, true);
    return;
  }

  knownUrls = newUrls;
}

// ── MAIN LOAD ──────────────────────────────────────────────────────────────
async function loadAll(forceFullRender = false) {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '↻';

  if (isFirstLoad || forceFullRender) skeleton();

  const results = await Promise.allSettled(SOURCES.map(fetchFeed));
  let articles = results.flatMap(r => r.status==='fulfilled' ? r.value : []);

  // Deduplicate
  const seen = new Set();
  articles = articles.filter(a => {
    if (!a.url || seen.has(a.url)) return false;
    seen.add(a.url); return true;
  });

  // Sort newest first, 72h window, cap 20
  articles = articles
    .filter(a => a.age < 72 * 3600000 && a.title)
    .sort((a,b) => a.age - b.age)
    .slice(0, 20);

  renderOrDiff(articles, isFirstLoad || forceFullRender);
  if (articles.length) updateTicker(articles);

  isFirstLoad = false;
  btn.disabled = false; btn.textContent = '↻ REFRESH';
  document.getElementById('upd').textContent =
    'UPDATED ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('count').textContent = articles.length ? articles.length + ' STORIES' : '';
}

document.getElementById('dateStr').textContent = new Date().toLocaleDateString('en-US',{
  weekday:'long', month:'long', day:'numeric'
}).toUpperCase();

loadAll();
// Auto-refresh every 5 minutes — smart diff, no skeleton flash
setInterval(() => loadAll(false), 5 * 60 * 1000);
</script>
</body>
</html>
