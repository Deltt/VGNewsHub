<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deltt's VG News Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <div class="logo">DELTT's NEWS HUB</div>
    <div class="hdr-right">
      <div class="pip"></div>
      <button class="rbtn" id="btn" onclick="loadAll(true)">↻ REFRESH</button>
    </div>
  </header>

  <div class="ticker">
    <div class="tflag">LIVE</div>
    <div class="tscroll">
      <div class="tinner" id="ticker">
        <span>Fetching gaming headlines…</span><span>Fetching gaming headlines…</span>
      </div>
    </div>
  </div>

  <main>
    <div class="sh">
      <div class="st">BREAKING — <em id="dateStr"></em></div>
      <div class="sc" id="count"></div>
    </div>
    <div id="container"></div>
  </main>

  <footer>
    <span id="upd">—</span>
    <span>POLYGON · IGN · KOTAKU · EUROGAMER · NINTENDO · XBOX · PLAYSTATION · VGC · GAMESPOT</span>
  </footer>

  <script src="scripts.js"></script>
</body>

</html>
